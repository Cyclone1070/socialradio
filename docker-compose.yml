version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: socialradio_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialradio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    container_name: socialradio_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/socialradio
      BROWSERLESS_WS_URL: ws://browserless:3000/playwright
      JWT_SECRET: ${JWT_SECRET:-super_secret_key}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      TTS_API_KEY: ${TTS_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      browserless:
        condition: service_started
    volumes:
      - hf_cache:/home/node/.cache

  browserless:
    image: browserless/chrome:latest
    container_name: socialradio_browserless
    ports:
      - "4000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
    restart: always

volumes:
  postgres_data:
  hf_cache:
